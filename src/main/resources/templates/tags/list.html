<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags - Music Stats</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <th:block th:replace="~{fragments/navigation :: nav-styles}"></th:block>
    <link rel="stylesheet" th:href="@{/css/catalog-list.css}">
    <style>
        .tags-page {
            max-width: 1800px;
            margin: 28px auto 48px;
            padding: 0 32px;
        }
        .tags-toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            margin-bottom: 18px;
        }
        .tags-title h1 {
            margin: 0;
            font-size: 1.6rem;
            line-height: 1.1;
        }
        .tags-title span {
            display: block;
            margin-top: 6px;
            color: #888;
            font-size: 0.9rem;
        }
        .tag-create-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tag-create-form input {
            width: min(320px, 48vw);
            height: 38px;
            padding: 0 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #111;
            color: #f4f7fa;
            font-size: 14px;
        }
        .tag-create-form input:focus {
            outline: none;
            border-color: #555;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
        }
        .tag-create-form button {
            height: 38px;
            padding: 0 14px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #222;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .tag-create-form button:hover {
            background: #333;
            border-color: #555;
        }
        .tag-card {
            position: relative;
        }
        .tag-card .catalog-info {
            padding: 16px;
        }
        .tag-card .catalog-name {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 28px;
            margin-bottom: 12px;
            padding-right: 28px;
            font-size: 18px;
            white-space: normal;
            word-break: break-word;
            overflow: visible;
        }
        .tag-name-icon {
            color: #888;
            font-size: 16px;
            flex: 0 0 auto;
        }
        .tag-delete-form {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 2;
        }
        .tag-delete-button {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            border-radius: 50%;
            background: transparent;
            color: #666;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }
        .tag-delete-button:hover {
            color: #fca5a5;
            border-color: rgba(248, 113, 113, 0.35);
            background: rgba(127, 29, 29, 0.28);
        }
        .tag-card .catalog-stats {
            margin-bottom: 10px;
        }
        .tag-card .catalog-stats .stat {
            text-decoration: none;
        }
        .tag-card .catalog-stats .stat:hover .stat-value {
            color: #22c55e;
        }
        .tag-card .gender-bars-container {
            margin-top: 14px;
        }
        .tag-card .number-one-info {
            margin-top: 14px;
        }
        .tag-alert {
            margin-bottom: 16px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .tag-alert-success {
            background: rgba(34, 197, 94, 0.16);
            border: 1px solid rgba(34, 197, 94, 0.35);
            color: #b7f7cc;
        }
        .tag-alert-error {
            background: rgba(239, 68, 68, 0.16);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fecaca;
        }
        .tag-empty {
            padding: 42px;
            border: 1px dashed #333;
            border-radius: 8px;
            color: #888;
            text-align: center;
        }
        @media (max-width: 720px) {
            .tags-page {
                padding: 0 16px;
            }
            .tags-toolbar {
                grid-template-columns: 1fr;
            }
            .tag-create-form {
                width: 100%;
            }
            .tag-create-form input {
                flex: 1;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <th:block th:replace="~{fragments/navigation :: navigation}"></th:block>

    <main class="tags-page">
        <div class="tags-toolbar">
            <div class="tags-title">
                <h1>Tags</h1>
                <span><span th:text="${tagCount}">0</span> total</span>
            </div>
            <form class="tag-create-form" th:action="@{/tags}" method="post">
                <input type="text" name="name" placeholder="New tag name" maxlength="100" required>
                <button type="submit">Create Tag</button>
            </form>
        </div>

        <div th:if="${successMessage}" class="tag-alert tag-alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="tag-alert tag-alert-error" th:text="${errorMessage}"></div>

        <div class="catalog-grid" th:if="${tags != null and !tags.isEmpty()}">
            <article class="catalog-card tag-card" th:each="tag : ${tags}">
                <form class="tag-delete-form"
                      th:action="@{/tags/{id}/delete(id=${tag.id})}"
                      method="post"
                      onsubmit="return confirm('Delete this tag and clear it from all artists, albums, and songs?');">
                    <button type="submit" class="tag-delete-button" title="Delete tag" aria-label="Delete tag">&times;</button>
                </form>

                <div class="catalog-info">
                    <h3 class="catalog-name">
                        <span class="tag-name-icon">&#127991;</span>
                        <span th:text="${tag.name}">Tag Name</span>
                    </h3>

                    <div class="catalog-stats">
                        <a class="stat"
                           th:href="@{/artists(tag=${tag.id}, tagMode='includes')}"
                           th:title="${tag.artistCount + ' artists'}">
                            <span class="stat-icon">&#127908;</span>
                            <span class="stat-value" th:text="${tag.artistCount}">0</span>
                        </a>
                        <a class="stat"
                           th:href="@{/albums(tag=${tag.id}, tagMode='includes')}"
                           th:title="${tag.albumCount + ' albums'}">
                            <span class="stat-icon">&#128191;</span>
                            <span class="stat-value" th:text="${tag.albumCount}">0</span>
                        </a>
                        <a class="stat"
                           th:href="@{/songs(tag=${tag.id}, tagMode='includes')}"
                           th:title="${tag.songCount + ' songs'}">
                            <span class="stat-icon">&#127925;</span>
                            <span class="stat-value" th:text="${tag.songCount}">0</span>
                        </a>
                    </div>

                    <div class="gender-bars-container">
                        <div class="gender-bar-row" th:if="${tag.maleArtistCount > 0 or tag.femaleArtistCount > 0 or tag.otherArtistCount > 0}">
                            <span class="gender-bar-icon" title="Artists">&#127908;</span>
                            <div class="gender-bar" th:with="total=${tag.maleArtistCount + tag.femaleArtistCount + tag.otherArtistCount}, malePct=${total > 0 ? (tag.maleArtistCount * 100.0 / total) : 0}">
                                <div class="gender-male-bar"
                                     th:style="'width: ' + ${malePct} + '%'"
                                     th:title="'Male: ' + ${tag.maleArtistCount} + ' (' + ${#numbers.formatDecimal(malePct, 1, 2)} + '%)'">
                                    <span class="gender-male-bar-text" th:text="${#numbers.formatDecimal(malePct, 1, 2)} + '%'"></span>
                                </div>
                                <div class="gender-female-bar"
                                     th:style="'width: ' + (${total > 0} ? (${tag.femaleArtistCount} * 100.0 / ${total}) : 0) + '%'"
                                     th:title="'Female: ' + ${tag.femaleArtistCount} + ' (' + ${#numbers.formatDecimal((tag.femaleArtistCount * 100.0 / total), 1, 2)} + '%)'"></div>
                                <div class="gender-other-bar"
                                     th:style="'width: ' + (${total > 0} ? (${tag.otherArtistCount} * 100.0 / ${total}) : 0) + '%'"
                                     th:title="'Other: ' + ${tag.otherArtistCount} + ' (' + ${#numbers.formatDecimal((tag.otherArtistCount * 100.0 / total), 1, 2)} + '%)'"></div>
                            </div>
                        </div>

                        <div class="gender-bar-row" th:if="${tag.maleAlbumCount > 0 or tag.femaleAlbumCount > 0 or tag.otherAlbumCount > 0}">
                            <span class="gender-bar-icon" title="Albums">&#128191;</span>
                            <div class="gender-bar" th:with="total=${tag.maleAlbumCount + tag.femaleAlbumCount + tag.otherAlbumCount}, malePct=${total > 0 ? (tag.maleAlbumCount * 100.0 / total) : 0}">
                                <div class="gender-male-bar"
                                     th:style="'width: ' + ${malePct} + '%'"
                                     th:title="'Male: ' + ${tag.maleAlbumCount} + ' (' + ${#numbers.formatDecimal(malePct, 1, 2)} + '%)'">
                                    <span class="gender-male-bar-text" th:text="${#numbers.formatDecimal(malePct, 1, 2)} + '%'"></span>
                                </div>
                                <div class="gender-female-bar"
                                     th:style="'width: ' + (${total > 0} ? (${tag.femaleAlbumCount} * 100.0 / ${total}) : 0) + '%'"
                                     th:title="'Female: ' + ${tag.femaleAlbumCount} + ' (' + ${#numbers.formatDecimal((tag.femaleAlbumCount * 100.0 / total), 1, 2)} + '%)'"></div>
                                <div class="gender-other-bar"
                                     th:style="'width: ' + (${total > 0} ? (${tag.otherAlbumCount} * 100.0 / ${total}) : 0) + '%'"
                                     th:title="'Other: ' + ${tag.otherAlbumCount} + ' (' + ${#numbers.formatDecimal((tag.otherAlbumCount * 100.0 / total), 1, 2)} + '%)'"></div>
                            </div>
                        </div>

                        <div class="gender-bar-row" th:if="${tag.maleSongCount > 0 or tag.femaleSongCount > 0 or tag.otherSongCount > 0}">
                            <span class="gender-bar-icon" title="Songs">&#127925;</span>
                            <div class="gender-bar" th:with="total=${tag.maleSongCount + tag.femaleSongCount + tag.otherSongCount}, malePct=${total > 0 ? (tag.maleSongCount * 100.0 / total) : 0}">
                                <div class="gender-male-bar"
                                     th:style="'width: ' + ${malePct} + '%'"
                                     th:title="'Male: ' + ${tag.maleSongCount} + ' (' + ${#numbers.formatDecimal(malePct, 1, 2)} + '%)'">
                                    <span class="gender-male-bar-text" th:text="${#numbers.formatDecimal(malePct, 1, 2)} + '%'"></span>
                                </div>
                                <div class="gender-female-bar"
                                     th:style="'width: ' + (${total > 0} ? (${tag.femaleSongCount} * 100.0 / ${total}) : 0) + '%'"
                                     th:title="'Female: ' + ${tag.femaleSongCount} + ' (' + ${#numbers.formatDecimal((tag.femaleSongCount * 100.0 / total), 1, 2)} + '%)'"></div>
                                <div class="gender-other-bar"
                                     th:style="'width: ' + (${total > 0} ? (${tag.otherSongCount} * 100.0 / ${total}) : 0) + '%'"
                                     th:title="'Other: ' + ${tag.otherSongCount} + ' (' + ${#numbers.formatDecimal((tag.otherSongCount * 100.0 / total), 1, 2)} + '%)'"></div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${tag.topArtistName != null or tag.topAlbumName != null or tag.topSongName != null}" class="number-one-info">
                        <a th:if="${tag.topArtistName != null}"
                           th:class="${'number-one-item' + (tag.topArtistGenderId == 2 ? ' gender-male' : (tag.topArtistGenderId == 1 ? ' gender-female' : ''))}"
                           th:href="@{'/artists/' + ${tag.topArtistId}}">
                            <span class="label">&#127908;</span>
                            <span class="name" th:text="${tag.topArtistName}" th:title="${tag.topArtistName}">Artist Name</span>
                        </a>
                        <a th:if="${tag.topAlbumName != null}"
                           th:class="${'number-one-item' + (tag.topAlbumGenderId == 2 ? ' gender-male' : (tag.topAlbumGenderId == 1 ? ' gender-female' : ''))}"
                           th:href="@{'/albums/' + ${tag.topAlbumId}}">
                            <span class="label">&#128191;</span>
                            <span class="name" th:text="${tag.topAlbumArtistName + ' - ' + tag.topAlbumName}" th:title="${tag.topAlbumArtistName + ' - ' + tag.topAlbumName}">Artist - Album</span>
                        </a>
                        <a th:if="${tag.topSongName != null}"
                           th:class="${'number-one-item' + (tag.topSongGenderId == 2 ? ' gender-male' : (tag.topSongGenderId == 1 ? ' gender-female' : ''))}"
                           th:href="@{'/songs/' + ${tag.topSongId}}">
                            <span class="label">&#127925;</span>
                            <span class="name" th:text="${tag.topSongArtistName + ' - ' + tag.topSongName}" th:title="${tag.topSongArtistName + ' - ' + tag.topSongName}">Artist - Song</span>
                        </a>
                    </div>
                </div>
            </article>
        </div>

        <div class="tag-empty" th:if="${tags == null or tags.isEmpty()}">
            No tags yet.
        </div>
    </main>
</body>
</html>
