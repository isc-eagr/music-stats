<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRL Recaps - Music Stats</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <th:block th:replace="~{fragments/navigation :: nav-styles}"></th:block>
    <!-- Flatpickr Date Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        .recap-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* Date picker bar */
        .recap-date-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .recap-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #aaa;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.12s;
            flex-shrink: 0;
            text-decoration: none;
        }
        .recap-nav-btn:hover:not(:disabled) { border-color: #4a90e2; color: #4a90e2; background: rgba(74,144,226,0.08); }
        .recap-nav-btn:disabled { opacity: 0.3; cursor: default; }
        .recap-date-bar label {
            font-size: 0.88rem;
            color: #aaa;
            font-weight: 600;
        }
        .recap-date-input {
            padding: 9px 14px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 0.88rem;
            width: 160px;
            outline: none;
        }
        .recap-date-input:focus { border-color: #4a90e2; }

        /* Showing date label */
        .recap-showing {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 16px;
        }
        .recap-showing strong { color: #ccc; }

        /* Table */
        .recap-table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }
        .recap-table {
            width: 100%;
            border-collapse: collapse;
            background: #141414;
        }
        .recap-table thead tr {
            background: #1e1e1e;
            border-bottom: 2px solid #333;
        }
        .recap-table th {
            padding: 11px 14px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .recap-table th.center,
        .recap-table td.center { text-align: center; }

        .recap-table tbody tr {
            border-bottom: 1px solid #1f1f1f;
            transition: background 0.12s;
        }
        .recap-table tbody tr:hover { background: #1c1c1c; }

        /* Gender row coloring */
        .recap-table tbody tr.gender-male {
            background: rgba(74, 144, 226, 0.06);
            border-left: 3px solid rgba(74, 144, 226, 0.5);
        }
        .recap-table tbody tr.gender-male:hover {
            background: rgba(74, 144, 226, 0.11);
        }
        .recap-table tbody tr.gender-female {
            background: rgba(217, 74, 138, 0.06);
            border-left: 3px solid rgba(217, 74, 138, 0.5);
        }
        .recap-table tbody tr.gender-female:hover {
            background: rgba(217, 74, 138, 0.11);
        }

        .recap-table td {
            padding: 10px 14px;
            font-size: 0.88rem;
            color: #d0d0d0;
            vertical-align: middle;
        }

        /* Position badge */
        .pos-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 0.82rem;
            font-weight: 700;
            background: #2a2a2a;
            color: #aaa;
            border: 1px solid #444;
        }

        /* Song / artist links */
        .recap-song-link {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 600;
        }
        .recap-song-link:hover { color: #4a90e2; text-decoration: underline; }

        .recap-artist-link {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .recap-artist-link:hover { color: #ccc; text-decoration: underline; }

        .recap-no-link-song   { color: #999; font-size: 0.88rem; }
        .recap-no-link-artist { color: #777; font-size: 0.85rem; }

        /* Retired / Hall of Fame entries */
        .recap-table tbody tr.recap-retired td { color: #c9a227; }
        .recap-table tbody tr.recap-retired .recap-song-link { color: #e8c547; }
        .recap-table tbody tr.recap-retired .recap-song-link:hover { color: #ffd700; }
        .recap-table tbody tr.recap-retired .recap-artist-link { color: #b8881e; }
        .recap-table tbody tr.recap-retired .recap-artist-link:hover { color: #d4a429; }
        .recap-table tbody tr.recap-retired .recap-no-link-song  { color: #c9a227; }
        .recap-table tbody tr.recap-retired .recap-no-link-artist { color: #a8861a; }
        .recap-table tbody tr.recap-retired .pos-badge {
            background: rgba(201,162,39,0.2);
            border-color: rgba(201,162,39,0.5);
            color: #c9a227;
        }
        .recap-table tbody tr.recap-retired.gender-male {
            background: rgba(74,144,226,0.07);
            border-left-color: rgba(74,144,226,0.55);
        }
        .recap-table tbody tr.recap-retired.gender-female {
            background: rgba(217,74,138,0.07);
            border-left-color: rgba(217,74,138,0.55);
        }

        /* Empty state */
        .recap-empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 0.95rem;
        }
        .recap-empty-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{fragments/navigation :: navigation}"></th:block>

    <div class="recap-container">
        <div class="topbar">
            <div class="breadcrumbs">
                <a href="/">Home</a> / <a href="/misc/trl">TRL</a> / <span>Recaps</span>
            </div>
            <h1>TRL Recaps</h1>
        </div>

        <!-- Date picker + nav arrows -->
        <div class="recap-date-bar">
            <button id="recapPrev" class="recap-nav-btn" title="Previous show" disabled>&#8592;</button>
            <label for="recapDate">Select date:</label>
            <input type="text" id="recapDate" class="recap-date-input" placeholder="Pick a date..." readonly>
            <button id="recapNext" class="recap-nav-btn" title="Next show" disabled>&#8594;</button>
        </div>

        <!-- Showing indicator -->
        <div id="recapShowing" class="recap-showing" style="display:none;">
            Showing countdown for <strong id="recapShowDate"></strong>
        </div>

        <!-- Countdown table -->
        <div id="recapContent">
            <div th:if="${countdown != null}">
                <div class="recap-showing">
                    Showing countdown for <strong th:text="${selectedDate}"></strong>
                </div>
                <div class="recap-table-wrap">
                    <table class="recap-table">
                        <thead>
                            <tr>
                                <th class="center" style="width:60px;">#</th>
                                <th>Song</th>
                                <th>Artist</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="e : ${countdown}"
                                th:classappend="${(e.genderClass != null ? e.genderClass : '')} + ${(e.retired ? ' recap-retired' : '')}">
                                <td class="center">
                                    <span class="pos-badge" th:text="${e.position}"></span>
                                </td>
                                <td>
                                    <a th:if="${e.songId != null}" class="recap-song-link"
                                       th:href="@{'/songs/' + ${e.songId}}" th:text="${e.songTitle}"></a>
                                    <span th:if="${e.songId == null}" class="recap-no-link-song" th:text="${e.songTitle}"></span>
                                </td>
                                <td>
                                    <a th:if="${e.artistId != null}" class="recap-artist-link"
                                       th:href="@{'/artists/' + ${e.artistId}}" th:text="${e.artistName}"></a>
                                    <span th:if="${e.artistId == null}" class="recap-no-link-artist" th:text="${e.artistName}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div th:if="${countdown == null}" class="recap-empty">
                <div class="recap-empty-icon">&#9835;</div>
                <div>Select a date to view that day's TRL countdown</div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const availableDates = /*[[${availableDates}]]*/ [];
        const selectedDate = /*[[${selectedDate}]]*/ null;

        const fp = flatpickr('#recapDate', {
            dateFormat: 'Y-m-d',
            minDate: '1998-09-14',
            maxDate: '2007-10-31',
            allowInput: false,
            enable: availableDates,
            defaultDate: selectedDate,
            onChange: function(selectedDates, dateStr) {
                if (dateStr) {
                    loadCountdown(dateStr);
                }
            }
        });

        document.getElementById('recapPrev').addEventListener('click', function() {
            if (this._date) loadCountdown(this._date);
        });
        document.getElementById('recapNext').addEventListener('click', function() {
            if (this._date) loadCountdown(this._date);
        });

        function loadCountdown(date) {
            fetch('/misc/trl/recaps/data?date=' + encodeURIComponent(date))
                .then(r => r.json())
                .then(data => {
                    const content = document.getElementById('recapContent');
                    if (!data.entries || data.entries.length === 0) {
                        content.innerHTML = '<div class="recap-empty"><div class="recap-empty-icon">&#9835;</div><div>No countdown found for this date</div></div>';
                        document.getElementById('recapShowing').style.display = 'none';
                        return;
                    }

                    // Update the flatpickr to show the actual effective date
                    if (data.date && data.date !== date) {
                        fp.setDate(data.date, false);
                    }

                    const showDiv = document.getElementById('recapShowing');
                    showDiv.style.display = '';
                    document.getElementById('recapShowDate').textContent = data.date;

                    // Update prev/next buttons
                    const prevBtn = document.getElementById('recapPrev');
                    const nextBtn = document.getElementById('recapNext');
                    if (data.prevDate) {
                        prevBtn.disabled = false;
                        prevBtn._date = data.prevDate;
                    } else {
                        prevBtn.disabled = true;
                        prevBtn._date = null;
                    }
                    if (data.nextDate) {
                        nextBtn.disabled = false;
                        nextBtn._date = data.nextDate;
                    } else {
                        nextBtn.disabled = true;
                        nextBtn._date = null;
                    }

                    let html = '<div class="recap-table-wrap"><table class="recap-table"><thead><tr>';
                    html += '<th class="center" style="width:60px;">#</th><th>Song</th><th>Artist</th>';
                    html += '</tr></thead><tbody>';

                    data.entries.forEach(function(e) {
                        let cls = '';
                        if (e.genderClass) cls += e.genderClass;
                        if (e.retired) cls += ' recap-retired';

                        html += '<tr class="' + cls.trim() + '">';
                        html += '<td class="center"><span class="pos-badge">' + e.position + '</span></td>';

                        if (e.songId) {
                            html += '<td><a class="recap-song-link" href="/songs/' + e.songId + '">' + escHtml(e.songTitle) + '</a></td>';
                        } else {
                            html += '<td><span class="recap-no-link-song">' + escHtml(e.songTitle) + '</span></td>';
                        }

                        if (e.artistId) {
                            html += '<td><a class="recap-artist-link" href="/artists/' + e.artistId + '">' + escHtml(e.artistName) + '</a></td>';
                        } else {
                            html += '<td><span class="recap-no-link-artist">' + escHtml(e.artistName) + '</span></td>';
                        }

                        html += '</tr>';
                    });

                    html += '</tbody></table></div>';
                    content.innerHTML = html;
                });
        }

        function escHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
