<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vato's Cuntdown Recaps - Music Stats</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <th:block th:replace="~{fragments/navigation :: nav-styles}"></th:block>
    <style>
        .recap-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
            --accent: #fa8072;
            --accent-strong: #ffb4aa;
            --accent-soft: rgba(250, 128, 114, 0.14);
            --accent-border: rgba(250, 128, 114, 0.34);
            --mobile-detail-card-bg: rgba(250, 128, 114, 0.09);
            --mobile-detail-card-border: rgba(250, 128, 114, 0.22);
            --mobile-detail-label: #ffd1ca;
            --mobile-detail-value: #fff1ee;
        }
        .overview-hero {
            margin-bottom: 22px;
        }
        .overview-hero-card {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(24, 24, 28, 0.95), rgba(12, 12, 15, 0.96));
            border: 1px solid #2a2a2f;
            border-radius: 18px;
            padding: 22px 24px;
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.28);
            text-align: center;
        }
        .overview-hero-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, var(--accent-soft), transparent 48%);
            pointer-events: none;
        }
        .overview-title {
            position: relative;
            z-index: 1;
            margin: 0;
            font-size: clamp(2rem, 3.5vw, 2.5rem);
            color: var(--accent-strong);
            text-align: center;
            text-shadow: 0 0 24px rgba(0, 0, 0, 0.24);
        }
        .overview-subtitle {
            position: relative;
            z-index: 1;
            margin-top: 10px;
            font-size: 1rem;
            font-weight: 700;
            color: #fff1ee;
            letter-spacing: 0.02em;
            text-align: center;
            text-shadow: 0 0 16px rgba(250, 128, 114, 0.18);
        }

        /* Date picker bar */
        .recap-date-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .recap-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #aaa;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.12s;
            flex-shrink: 0;
            text-decoration: none;
        }
        .recap-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
        .recap-nav-btn:disabled { opacity: 0.3; cursor: default; }
        .recap-date-select {
            padding: 9px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 0.88rem;
            outline: none;
            cursor: pointer;
        }
        .recap-date-select:focus { border-color: var(--accent); }
        .recap-date-select option {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .recap-playlist-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--accent-border);
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.12s;
        }
        .recap-playlist-btn:hover {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 20%, transparent);
            color: #fff1ee;
        }

        /* Section header for close calls */
        .recap-section-header {
            font-size: 0.78rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin: 24px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2a2a2a;
        }

        /* Table */
        .recap-table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }
        .recap-table {
            width: 100%;
            border-collapse: collapse;
            background: #141414;
        }
        .recap-table thead tr {
            background: #1e1e1e;
            border-bottom: 2px solid #333;
        }
        .recap-table th {
            padding: 11px 14px;
            text-align: left;
            font-size: 0.78rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .recap-table th.center,
        .recap-table td.center { text-align: center; }

        .recap-table tbody tr {
            border-bottom: 1px solid #1f1f1f;
            transition: background 0.12s;
        }
        .recap-table tbody tr:hover { background: #1c1c1c; }

        /* Gender row coloring */
        .recap-table tbody tr.gender-male {
            background: rgba(74, 144, 226, 0.06);
            border-left: 3px solid rgba(74, 144, 226, 0.5);
        }
        .recap-table tbody tr.gender-male:hover {
            background: rgba(74, 144, 226, 0.11);
        }
        .recap-table tbody tr.gender-female {
            background: rgba(217, 74, 138, 0.06);
            border-left: 3px solid rgba(217, 74, 138, 0.5);
        }
        .recap-table tbody tr.gender-female:hover {
            background: rgba(217, 74, 138, 0.11);
        }

        .recap-table td {
            padding: 10px 14px;
            font-size: 0.88rem;
            color: #d0d0d0;
            vertical-align: middle;
        }

        /* Position badge */
        .pos-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 0.82rem;
            font-weight: 700;
            background: #2a2a2a;
            color: #aaa;
            border: 1px solid #444;
        }
        .peak-now-pill {
            display: block;
            align-items: center;
            justify-content: center;
            padding: 2px 7px;
            margin-top: 4px;
            border-radius: 999px;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #ffd978;
            background: rgba(245, 158, 11, 0.14);
            border: 1px solid rgba(245, 158, 11, 0.34);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        /* Song / artist links */
        .recap-song-link {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 600;
        }
        .recap-song-link:hover { color: var(--accent); text-decoration: underline; }

        .recap-artist-link {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .recap-artist-link:hover { color: #ccc; text-decoration: underline; }

        .recap-no-link-song   { color: #999; font-size: 0.88rem; }
        .recap-no-link-artist { color: #777; font-size: 0.85rem; }

        /* Empty state */
        .recap-empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 0.95rem;
        }
        .recap-empty-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* Movement badges */
        .mvmt {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .mvmt-new  { background: rgba(46,160,67,0.18); color: #3fb950; border: 1px solid rgba(46,160,67,0.35); }
        .mvmt-re   { background: rgba(210,139,0,0.18);  color: #e3a420; border: 1px solid rgba(210,139,0,0.35); }
        .mvmt-up   { background: rgba(46,160,67,0.12);  color: #3fb950; border: 1px solid rgba(46,160,67,0.25); }
        .mvmt-down { background: rgba(218,54,54,0.12);  color: #f07070; border: 1px solid rgba(218,54,54,0.25); }
        .mvmt-same { background: transparent; color: #666; border: 1px solid #333; }

        .recap-table th.right,
        .recap-table td.right { text-align: right; }
        .recap-table th.stat-col { min-width: 48px; }
        .recap-expand-btn {
            background: #222;
            border: 1px solid #333;
            color: #888;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            transition: all 0.2s ease;
        }
        .recap-expand-btn:hover {
            background: #333;
            color: #fff;
        }
        .recap-expand-btn.expanded {
            background: rgba(115, 115, 125, 0.14);
            border-color: rgba(115, 115, 125, 0.4);
            color: #d1d5db;
        }
        .recap-table tbody tr.gender-male .recap-expand-btn.expanded {
            background: rgba(74, 144, 226, 0.14);
            border-color: rgba(74, 144, 226, 0.45);
            color: #93c5fd;
        }
        .recap-table tbody tr.gender-female .recap-expand-btn.expanded {
            background: rgba(217, 74, 138, 0.14);
            border-color: rgba(217, 74, 138, 0.45);
            color: #f9a8d4;
        }
        .recap-detail-row { display: none; }
        .recap-detail-row.visible { display: table-row; }
        .recap-detail-cell {
            background: #0f0f0f;
            padding: 16px 20px !important;
        }
        .recap-run-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .recap-run-stat {
            background: var(--mobile-detail-card-bg);
            border: 1px solid var(--mobile-detail-card-border);
            border-radius: 8px;
            padding: 10px 14px;
            text-align: center;
            min-width: 70px;
        }
        .recap-run-stat-label {
            font-size: 0.72rem;
            color: var(--mobile-detail-label);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .recap-run-stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--mobile-detail-value);
        }
        .recap-run-label {
            font-size: 0.78rem;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .recap-run-boxes {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .recap-run-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            padding: 0 7px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
            background: #3a3b43;
            border: 1px solid #555861;
        }
        .recap-run-box.gender-male { background: #2a5c8a; border-color: #3a7cc0; }
        .recap-run-box.gender-female { background: #8a2a63; border-color: #c04a8d; }
        .recap-run-box.gender-other { background: #3a3b43; border-color: #555861; color: #e5e7eb; }
        .recap-run-box.peak-one { background: #7c5200; border-color: #c47f00; color: #ffd966; }
        .recap-run-box.absent { background: #222; border-color: #333; color: #666; cursor: default; }
        .recap-run-loading { color: #888; font-size: 0.82rem; }
        .recap-run-error { color: #f87171; font-size: 0.82rem; }
        .chart-link {
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .chart-link:hover {
            text-decoration: underline;
        }
        .chart-link-primary {
            color: #fff;
        }
        .chart-link-primary:hover {
            color: #22c55e;
        }
        .chart-link-secondary {
            color: #aaa;
        }
        .chart-link-secondary:hover {
            color: #fff;
        }
        .mobile-inline-artist {
            display: none;
            margin-top: 4px;
            font-size: 0.78rem;
            line-height: 1.25;
        }
        .mobile-inline-artist .chart-link-secondary {
            color: #aaa;
        }
        .mobile-inline-artist .chart-link-secondary:hover {
            color: #fff;
        }
        .recap-table-wrap {
            border-radius: 18px;
            border: 1px solid #252834;
            background: #101118;
        }
        .recap-table {
            background: #12131a;
        }
        .recap-table thead tr {
            background: #171922;
            border-bottom: 1px solid #2b3140;
        }
        .recap-table th {
            padding: 12px 16px;
            font-size: 0.74rem;
            font-weight: 700;
            color: #8c8f9a;
            letter-spacing: 0.08em;
        }
        .recap-table td {
            padding: 12px 16px;
        }
        .recap-table .col-title,
        .recap-table .col-artist,
        .recap-table .mobile-name-col {
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .recap-table .cover-col {
            width: 62px;
            padding: 8px 10px;
        }
        .recap-table .cover-col img,
        .recap-table .cover-col .cover-placeholder {
            width: 42px;
            height: 42px;
            border-radius: 6px;
        }
        .recap-table .cover-col img {
            display: block;
            object-fit: cover;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
        }
        .recap-table .cover-col .cover-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a, #262626);
            border: 1px dashed #333;
            color: #666;
        }
        .recap-table tbody tr {
            border-bottom: 1px solid #1b1d27;
        }
        .recap-table tbody tr:hover {
            background: #161824;
        }
        .recap-table tbody tr.gender-female {
            background: rgba(236, 72, 153, 0.15);
            border-left: 3px solid rgba(236, 72, 153, 0.6);
        }
        .recap-table tbody tr.gender-female:hover {
            background: rgba(236, 72, 153, 0.19);
        }
        .recap-table tbody tr.gender-male {
            background: rgba(59, 130, 246, 0.15);
            border-left: 3px solid rgba(59, 130, 246, 0.6);
        }
        .recap-table tbody tr.gender-male:hover {
            background: rgba(59, 130, 246, 0.19);
        }
        .recap-table th.col-expand,
        .recap-table td.col-expand {
            width: 52px;
            text-align: center;
        }
        .recap-table th.col-movement,
        .recap-table td.col-movement {
            min-width: 90px;
            text-align: center;
        }
        .recap-table th.col-position,
        .recap-table td.col-position,
        .recap-table th.col-peak,
        .recap-table td.col-peak,
        .recap-table th.col-span,
        .recap-table td.col-span,
        .recap-table th.col-at-peak,
        .recap-table td.col-at-peak {
            text-align: center;
        }
        .position-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .position-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        .mvmt {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: #1f2937;
            color: #d1d5db;
            border: 1px solid #374151;
        }
        .mvmt-up {
            color: #86efac;
            background: rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.3);
        }
        .mvmt-down {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .mvmt-same {
            color: #d1d5db;
            background: rgba(148, 163, 184, 0.12);
            border-color: rgba(148, 163, 184, 0.28);
        }
        .mvmt-new {
            color: #86efac;
            background: rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.3);
        }
        .mvmt-re {
            color: #fcd34d;
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.3);
        }
        .peak-cell,
        .recap-pos-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .peak-position {
            font-size: 1.1rem;
            font-weight: 700;
            color: #e5e7eb;
        }
        .peak-position.peak-number-one {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.6), 0 0 20px rgba(251, 191, 36, 0.4);
        }
        .title-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .title-image,
        .title-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .title-image {
            object-fit: cover;
            background: #0f1016;
        }
        .title-placeholder {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #444;
        }
        .recap-expand-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }
        .recap-run-stat {
            background: var(--mobile-detail-card-bg);
            border: 1px solid var(--mobile-detail-card-border);
            border-radius: 8px;
        }
        .recap-run-box {
            min-width: 28px;
            height: 28px;
            padding: 0 7px;
            border-radius: 8px;
            font-size: 0.78rem;
            background: #25262d;
            color: #d9dde7;
            border: 1px solid #3b3d46;
        }
        .recap-run-box:hover {
            border-color: rgba(96, 165, 250, 0.34);
            color: #fff;
        }
        .recap-run-box.current {
            border-color: rgba(96, 165, 250, 0.42);
            box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.2) inset;
        }
        .recap-run-box.peak-one {
            background: rgba(245, 158, 11, 0.18);
            border-color: rgba(251, 191, 36, 0.45);
            color: #fcd34d;
        }

        @media (max-width: 768px) {
            .recap-container {
                padding: 0 12px 32px;
            }

            .overview-hero-card {
                padding: 18px 16px;
            }

            .overview-title {
                font-size: 1.7rem;
            }

            .overview-subtitle {
                font-size: 0.92rem;
            }

            .recap-date-bar {
                display: grid;
                grid-template-columns: 34px minmax(0, 1.25fr) minmax(0, 0.8fr) minmax(0, 1fr) 34px;
                align-items: center;
                gap: 8px;
                margin-bottom: 18px;
            }

            .recap-date-select {
                width: 100%;
                flex: 0 1 auto;
                min-width: 0;
            }

            .recap-table-wrap {
                overflow-x: auto;
            }

            .recap-table.table.mobile-compact-table {
                width: 100%;
                min-width: 0;
                table-layout: fixed;
            }

            .recap-table.table.mobile-compact-table th,
            .recap-table.table.mobile-compact-table td {
                padding: 8px 6px;
            }

            .recap-table.table.mobile-compact-table th.mobile-expand-col,
            .recap-table.table.mobile-compact-table td.mobile-expand-col {
                width: 32px;
                padding-left: 4px;
                padding-right: 4px;
            }

            .recap-table.table.mobile-compact-table th.col-position,
            .recap-table.table.mobile-compact-table td.col-position,
            .recap-table.table.mobile-compact-table th.col-span,
            .recap-table.table.mobile-compact-table td.col-span,
            .recap-table.table.mobile-compact-table th.col-peak,
            .recap-table.table.mobile-compact-table td.col-peak {
                width: 52px;
            }

            .recap-table.table.mobile-compact-table th.mobile-name-col,
            .recap-table.table.mobile-compact-table td.mobile-name-col {
                white-space: normal;
                min-width: 0;
                overflow-wrap: break-word;
                word-break: normal;
            }

            .recap-table .cover-col {
                width: 44px;
                padding: 3px 6px;
            }

            .recap-table .cover-col img,
            .recap-table .cover-col .cover-placeholder {
                width: 38px;
                height: 38px;
            }

            .recap-table.table.mobile-compact-table .mobile-table-detail-cell {
                white-space: normal;
            }

            .recap-table.table.mobile-compact-table .position-number {
                font-size: 1.15rem;
            }

            .recap-table.table.mobile-compact-table .peak-position {
                font-size: 1rem;
            }

            .recap-table.table.mobile-compact-table .peak-now-pill {
                display: none;
            }

            .mobile-inline-artist {
                display: block;
            }
        }
    </style>
</head>
<body>
    <th:block th:replace="~{fragments/navigation :: navigation}"></th:block>

    <div class="recap-container">
        <div class="overview-hero">
            <section class="overview-hero-card">
                <h1 class="overview-title">Vato's Cuntdown Recaps</h1>
                <div class="overview-subtitle" id="recapHeroDate" th:text="${selectedDate != null ? selectedDate : 'Select a countdown date'}">2004-01-01</div>
            </section>
        </div>

        <!-- Date picker dropdowns + nav arrows -->
        <div class="recap-date-bar">
            <button id="recapPrev" class="recap-nav-btn" title="Previous show" disabled>&#8592;</button>
            <select id="recapMonth" class="recap-date-select" title="Month"></select>
            <select id="recapDay" class="recap-date-select" title="Day"></select>
            <select id="recapYear" class="recap-date-select" title="Year"></select>
            <button id="recapNext" class="recap-nav-btn" title="Next show" disabled>&#8594;</button>

                                                <div class="cover-placeholder" style="display:none;"><span>&#9835;</span></div>

                                               th:href="@{'/songs/' + ${e.songId}}" th:text="${e.songTitle}"></a>
                                            <span th:if="${e.songId == null}" class="chart-link chart-link-primary" th:text="${e.songTitle}"></span>

                                                   th:href="@{'/artists/' + ${e.artistId}}" th:text="${e.artistName}"></a>
                                                <span th:if="${e.artistId == null}" class="chart-link chart-link-secondary" th:text="${e.artistName}"></span>
                                            </div>

                                               th:href="@{'/artists/' + ${e.artistId}}" th:text="${e.artistName}"></a>
                                            <span th:if="${e.artistId == null}" class="chart-link chart-link-secondary" th:text="${e.artistName}"></span>

    <th:block th:replace="~{fragments/playlist-generator-modal :: playlist-generator-modal}"></th:block>

    <script th:inline="javascript">
        const availableDates = /*[[${availableDates}]]*/ [];
        const selectedDate = /*[[${selectedDate}]]*/ null;
        let currentRecapDate = selectedDate;
        const recapRunCache = new Map();

        function updateRecapHeroDate(date) {
            const titleDate = document.getElementById('recapHeroDate');
            if (titleDate) {
                titleDate.textContent = date || 'Select a countdown date';
            }
        }

        function openPcRecapPlaylistGenerator() {
            const songs = getLinkedRecapSongs();
            if (songs.length === 0) {
                showWarningToast('No linked library songs found for this Vato\'s Cuntdown recap');
                return;
            }

            const defaultName = 'Vatos Cuntdown Recap' + (currentRecapDate ? ' - ' + currentRecapDate : '');
            openPlaylistGeneratorModal(songs, defaultName);
        }

        function getLinkedRecapSongs() {
            const rows = document.querySelectorAll('#recapContent .recap-table-wrap:first-of-type tbody tr[data-song-id]');
            const songs = [];

            rows.forEach(function(row) {
                const songId = row.getAttribute('data-song-id');
                if (!songId) return;

                const songTitle = row.getAttribute('data-raw-song') || '';
                const artistName = row.getAttribute('data-raw-artist') || '';
                if (!songTitle || !artistName) return;

                songs.push({
                    id: parseInt(songId, 10),
                    name: songTitle,
                    artist: artistName,
                    album: ''
                });
            });

            return songs;
        }

        // Parse selectedDate into components if available
        let initYear = null, initMonth = null, initDay = null;
        if (selectedDate) {
            const parts = selectedDate.split('-');
            if (parts.length === 3) {
                initYear = parts[0];
                initMonth = parts[1];
                initDay = parts[2];
            }
        }

        // Build month dropdown
        const monthSelect = document.getElementById('recapMonth');
        const months = ['January', 'February', 'March', 'April', 'May', 'June',
                        'July', 'August', 'September', 'October', 'November', 'December'];
        const monthOption = document.createElement('option');
        monthOption.value = '';
        monthOption.textContent = '-- Month --';
        monthSelect.appendChild(monthOption);
        months.forEach(function(m, i) {
            const opt = document.createElement('option');
            opt.value = String(i + 1).padStart(2, '0');
            opt.textContent = m;
            if (initMonth === opt.value) opt.selected = true;
            monthSelect.appendChild(opt);
        });

        // Build day dropdown (1-31)
        const daySelect = document.getElementById('recapDay');
        const dayOption = document.createElement('option');
        dayOption.value = '';
        dayOption.textContent = '-- Day --';
        daySelect.appendChild(dayOption);
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = String(i).padStart(2, '0');
            opt.textContent = String(i).padStart(2, '0');
            if (initDay === opt.value) opt.selected = true;
            daySelect.appendChild(opt);
        }

        // Build year dropdown (2003-2009)
        const yearSelect = document.getElementById('recapYear');
        const yearOption = document.createElement('option');
        yearOption.value = '';
        yearOption.textContent = '-- Year --';
        yearSelect.appendChild(yearOption);
        for (let y = 2003; y <= 2009; y++) {
            const opt = document.createElement('option');
            opt.value = String(y);
            opt.textContent = String(y);
            if (initYear === opt.value) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        // Handle dropdown changes
        [monthSelect, daySelect, yearSelect].forEach(function(sel) {
            sel.addEventListener('change', function() {
                const m = monthSelect.value;
                const d = daySelect.value;
                const y = yearSelect.value;
                if (m && d && y) {
                    const dateStr = y + '-' + m + '-' + d;
                    loadCountdown(dateStr);
                }
            });
        });

        document.getElementById('recapPrev').addEventListener('click', function() {
            if (this._date) loadCountdown(this._date);
        });
        document.getElementById('recapNext').addEventListener('click', function() {
            if (this._date) loadCountdown(this._date);
        });

        // Load initial date if coming from a link
        if (selectedDate) {
            const dateStr = selectedDate;
            setTimeout(function() { loadCountdown(dateStr); }, 0);
        }

        function loadCountdown(date) {
            fetch('/misc/vatos-cuntdown/recaps/data?date=' + encodeURIComponent(date))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    const content = document.getElementById('recapContent');
                    if (!data.entries || data.entries.length === 0) {
                        content.innerHTML = '<div class="recap-empty"><div class="recap-empty-icon">&#9835;</div><div>No countdown found for this date</div></div>';
                        updateRecapHeroDate(date);
                        return;
                    }

                    // Update the dropdowns to show the actual effective date
                    syncDateSelectors(data.date);
                    currentRecapDate = data.date || date;
                    updateRecapHeroDate(currentRecapDate);

                    // Update prev/next buttons
                    const prevBtn = document.getElementById('recapPrev');
                    const nextBtn = document.getElementById('recapNext');
                    if (data.prevDate) {
                        prevBtn.disabled = false;
                        prevBtn._date = data.prevDate;
                    } else {
                        prevBtn.disabled = true;
                        prevBtn._date = null;
                    }
                    if (data.nextDate) {
                        nextBtn.disabled = false;
                        nextBtn._date = data.nextDate;
                    } else {
                        nextBtn.disabled = true;
                        nextBtn._date = null;
                    }

                    // Split into main entries and close calls
                    const mainEntries = data.entries.filter(function(e) { return !e.isClosecall; });
                    const closeCallEntries = data.entries.filter(function(e) { return e.isClosecall; });

                    // Build main countdown table
                    let html = '<div class="recap-table-wrap"><table class="recap-table table mobile-compact-table"><thead><tr>';
                    html += '<th class="mobile-expand-col show-mobile-only" data-no-sort></th><th class="col-expand hide-mobile"></th><th class="cover-col"></th><th class="center col-movement hide-mobile" title="Movement vs previous countdown">Movement</th><th class="center col-position">Pos.</th><th class="col-title mobile-name-col">Song</th><th class="col-artist hide-mobile">Artist</th>';
                    html += '<th class="center col-span" title="Days on countdown up to this date">Days</th>';
                    html += '<th class="center col-peak" title="Peak position">Peak</th>';
                    html += '<th class="center col-at-peak hide-mobile" title="Days at peak">Days @ Peak</th>';
                    html += '</tr></thead><tbody>';

                    mainEntries.forEach(function(e) {
                        let cls = '';
                        if (e.genderClass) cls += e.genderClass;
                        const detailId = buildRecapDetailId('pc', e, data.date);

                        html += '<tr class="' + cls.trim() + '"'
                            + ' data-song-id="' + (e.songId != null ? e.songId : '') + '"'
                            + ' data-raw-artist="' + escHtml(e.artistName) + '"'
                            + ' data-raw-song="' + escHtml(e.songTitle) + '"'
                            + ' data-mobile-artist="' + escHtml(e.artistName || '-') + '"'
                            + ' data-mobile-movement="' + escHtml(e.movement != null ? String(e.movement) : '-') + '"'
                            + ' data-mobile-movement-class="' + escHtml(e.movementClass || '') + '"'
                            + ' data-mobile-at-peak="' + escHtml(formatPeakCount(e.daysAtPeak)) + '"'
                            + ' data-mobile-at-peak-label="Days @ Peak"'
                            + ' data-detail-id="' + detailId + '">';
                        html += '<td class="mobile-expand-col show-mobile-only"><button type="button" class="mobile-row-expand-btn" onclick="toggleRecapMobileDetails(this, \'pc\')" aria-label="Show PC recap details" aria-expanded="false">+</button></td>';
                        html += '<td class="center col-expand hide-mobile"><button class="recap-expand-btn" onclick="toggleRecapExpand(this, \'pc\')" title="Show chart run">+</button></td>';
                        if (e.movement != null) {
                            html += '<td class="center col-movement hide-mobile"><span class="mvmt ' + (e.movementClass || '') + '">' + escHtml(String(e.movement)) + '</span></td>';
                        } else {
                            html += '<td class="center col-movement hide-mobile"><span style="color:#555;">-</span></td>';
                        }

                        html += renderSongCoverCell(e);
                        html += '<td class="center col-position">' + renderPositionCell(e.position) + '</td>';
                        html += '<td class="col-title mobile-name-col">' + renderSongNameCell(e) + '</td>';
                        html += '<td class="col-artist hide-mobile">' + renderArtistCell(e) + '</td>';
                        html += '<td class="center col-span">' + (e.days != null ? e.days : '-') + '</td>';
                        html += '<td class="center col-peak">' + renderPeakCell(e) + '</td>';
                        html += '<td class="center col-at-peak hide-mobile">' + formatPeakCount(e.daysAtPeak) + '</td>';

                        html += '</tr>';
                        html += '<tr class="recap-detail-row"><td colspan="10" class="recap-detail-cell"><div class="recap-run-loading" id="' + detailId + '">Expand to load chart run...</div></td></tr>';
                    });

                    html += '</tbody></table></div>';

                    // Build close calls section if any
                    if (closeCallEntries.length > 0) {
                        html += '<div class="recap-section-header">Close Calls</div>';
                        html += '<div class="recap-table-wrap"><table class="recap-table table mobile-compact-table"><thead><tr>';
                        html += '<th class="mobile-expand-col show-mobile-only" data-no-sort></th><th class="center col-position">Pos.</th><th class="cover-col"></th><th class="col-title mobile-name-col">Song</th><th class="col-artist hide-mobile">Artist</th>';
                        html += '</tr></thead><tbody>';

                        closeCallEntries.forEach(function(e) {
                            let cls = '';
                            if (e.genderClass) cls += e.genderClass;

                            html += '<tr class="' + cls.trim() + '" data-mobile-movement="OFF" data-mobile-movement-class="mvmt-down" data-mobile-at-peak="' + formatPeakCount(e.daysAtPeak) + '" data-mobile-at-peak-label="Days @ Peak">';
                            html += '<td class="mobile-expand-col show-mobile-only"><button type="button" class="mobile-row-expand-btn" onclick="toggleRecapMobileDetails(this, \'pc\')" aria-label="Show PC fall-off details" aria-expanded="false">+</button></td>';
                            html += '<td class="center col-position">' + renderPositionCell(e.position) + '</td>';
                            html += renderSongCoverCell(e);
                            html += '<td class="col-title mobile-name-col">' + renderSongNameCell(e) + '</td>';
                            html += '<td class="col-artist hide-mobile">' + renderArtistCell(e) + '</td>';

                            html += '</tr>';
                        });

                        html += '</tbody></table></div>';
                    }

                    if (data.fallOffs && data.fallOffs.length > 0) {
                        html += '<div class="recap-section-header">Fall-offs</div>';
                        html += '<div class="recap-table-wrap"><table class="recap-table table mobile-compact-table"><thead><tr>';
                        html += '<th class="mobile-expand-col show-mobile-only" data-no-sort></th><th class="center col-expand hide-mobile"></th><th class="center col-position">Pos.</th><th class="cover-col"></th><th class="col-title mobile-name-col">Song</th><th class="col-artist hide-mobile">Artist</th>';
                        html += '<th class="center col-span" title="Days on countdown before dropping off">Days</th>';
                        html += '<th class="center col-peak" title="Peak position">Peak</th>';
                        html += '<th class="center col-at-peak hide-mobile" title="Days at peak">Days @ Peak</th>';
                        html += '</tr></thead><tbody>';

                        data.fallOffs.forEach(function(e) {
                            let cls = '';
                            if (e.genderClass) cls += e.genderClass;
                            const detailId = buildRecapDetailId('pc', e, data.date);

                            html += '<tr class="' + cls.trim() + '" data-song-id="' + (e.songId != null ? e.songId : '') + '" data-raw-artist="' + escHtml(e.artistName) + '" data-raw-song="' + escHtml(e.songTitle) + '" data-detail-id="' + detailId + '" data-mobile-movement="OFF" data-mobile-movement-class="mvmt-down" data-mobile-at-peak="' + formatPeakCount(e.daysAtPeak) + '" data-mobile-at-peak-label="Days @ Peak">';
                            html += '<td class="mobile-expand-col show-mobile-only"><button type="button" class="mobile-row-expand-btn" onclick="toggleRecapMobileDetails(this, \'pc\')" aria-label="Show PC fall-off details" aria-expanded="false">+</button></td>';
                            html += '<td class="center col-expand hide-mobile"><button class="recap-expand-btn" onclick="toggleRecapExpand(this, \'pc\')" title="Show chart run">+</button></td>';
                            html += '<td class="center col-position">' + renderPositionCell(e.position) + '</td>';
                            html += renderSongCoverCell(e);
                            html += '<td class="col-title mobile-name-col">' + renderSongNameCell(e) + '</td>';
                            html += '<td class="col-artist hide-mobile">' + renderArtistCell(e) + '</td>';
                            html += '<td class="center col-span">' + (e.days != null ? e.days : '-') + '</td>';
                            html += '<td class="center col-peak">' + renderPeakCell(e) + '</td>';
                            html += '<td class="center col-at-peak hide-mobile">' + formatPeakCount(e.daysAtPeak) + '</td>';
                            html += '</tr>';
                            html += '<tr class="recap-detail-row"><td colspan="9" class="recap-detail-cell"><div class="recap-run-loading" id="' + detailId + '">Expand to load chart run...</div></td></tr>';
                        });

                        html += '</tbody></table></div>';
                    }

                    content.innerHTML = html;
                });
        }

        function syncDateSelectors(date) {
            if (!date) return;
            const parts = date.split('-');
            if (parts.length !== 3) return;
            yearSelect.value = parts[0];
            monthSelect.value = parts[1];
            daySelect.value = parts[2];
        }

        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g, '&#39;');
        }

        function renderPositionCell(position) {
            return '<div class="position-cell"><span class="position-number">' + escHtml(position != null ? position : '-') + '</span></div>';
        }

        function renderSongVisual(songId) {
            if (!songId) {
                return '<div class="title-placeholder"><span>&#9835;</span></div>';
            }
            return '<img src="/songs/' + songId + '/image" alt="" class="title-image" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">'
                + '<div class="title-placeholder" style="display:none;"><span>&#9835;</span></div>';
        }

        function renderSongNameCell(entry) {
            const title = escHtml(entry.songTitle || '');
            const titleHtml = entry.songId
                ? '<a class="chart-link chart-link-primary" href="/songs/' + entry.songId + '">' + title + '</a>'
                : '<span class="chart-link chart-link-primary">' + title + '</span>';
            return titleHtml + renderMobileArtistInline(entry);
        }

        function renderSongCoverCell(entry) {
            return '<td class="cover-col">' + renderSongVisual(entry.songId) + '</td>';
        }

        function renderArtistCell(entry) {
            const artist = escHtml(entry.artistName || '');
            if (entry.artistId) {
                return '<a class="chart-link chart-link-secondary" href="/artists/' + entry.artistId + '">' + artist + '</a>';
            }
            return '<span class="chart-link chart-link-secondary">' + artist + '</span>';
        }

        function renderMobileArtistInline(entry) {
            return '<div class="mobile-inline-artist">' + renderArtistCell(entry) + '</div>';
        }

        function renderPeakCell(entry) {
            const peakPill = isPeakNow(entry) ? '<span class="peak-now-pill">Peak</span>' : '';
            const peakClass = Number(entry.peak) === 1 ? ' peak-number-one' : '';
            return '<div class="peak-cell"><span class="recap-pos-cell"><span class="peak-position' + peakClass + '">' + (entry.peak != null ? entry.peak : '-') + '</span>' + peakPill + '</span></div>';
        }

        function formatPeakCount(value) {
            return value != null ? 'x' + value : '-';
        }

        function buildRecapDetailId(chartType, entry, date) {
            const base = entry.songId != null
                ? 'song-' + entry.songId
                : 'raw-' + encodeURIComponent((entry.artistName || '') + '||' + (entry.songTitle || ''));
            return chartType + '-recap-run-' + base + '-' + encodeURIComponent(date || 'current');
        }

        async function toggleRecapMobileDetails(button, chartType) {
            const row = button.closest('tr');
            if (!row) return;

            let detailRow = row.nextElementSibling;
            if (!detailRow || !detailRow.classList.contains('mobile-table-detail-row')) {
                detailRow = document.createElement('tr');
                detailRow.className = 'mobile-table-detail-row';

                const detailCell = document.createElement('td');
                detailCell.className = 'mobile-table-detail-cell';
                detailCell.colSpan = Array.from(row.cells).filter(function(cell) {
                    return window.getComputedStyle(cell).display !== 'none';
                }).length;
                detailCell.innerHTML = renderRecapMobileDetails(row);

                detailRow.appendChild(detailCell);
                row.insertAdjacentElement('afterend', detailRow);
            }

            const isVisible = detailRow.classList.contains('visible');
            detailRow.classList.toggle('visible', !isVisible);
            button.classList.toggle('expanded', !isVisible);
            button.textContent = isVisible ? '+' : '-';
            button.setAttribute('aria-expanded', String(!isVisible));
            if (isVisible) return;

            const runContainer = detailRow.querySelector('[data-mobile-run-container]');
            if (runContainer) {
                await loadRecapRunIntoContainer(runContainer, row, chartType || 'pc');
            }
        }

        function renderRecapMobileDetails(row) {
            const detailFields = [
                {
                    label: 'Movement',
                    value: row.dataset.mobileMovement,
                    html: renderRecapMobileMovement(row)
                },
                {
                    label: row.dataset.mobileAtPeakLabel || 'At Peak',
                    value: row.dataset.mobileAtPeak,
                    html: escHtml(row.dataset.mobileAtPeak || '-')
                }
            ].filter(function(field) {
                return field.value !== undefined && field.value !== null && field.value !== '';
            });

            const hasRunDetails = !!row.dataset.detailId;

            return '<div class="mobile-table-detail-grid">' + detailFields.map(function(field) {
                return '<div class="mobile-table-detail-item">'
                    + '<span class="mobile-table-detail-label">' + escHtml(field.label) + '</span>'
                    + '<span class="mobile-table-detail-value">' + field.html + '</span>'
                    + '</div>';
            }).join('') + '</div>'
                + (hasRunDetails ? '<div style="margin-top:12px;"><div class="recap-run-loading" data-mobile-run-container="1">Loading chart run...</div></div>' : '');
        }

        function renderRecapMobileMovement(row) {
            const movement = row.dataset.mobileMovement || '-';
            if (movement === '-') {
                return '<span>-</span>';
            }
            const movementClass = row.dataset.mobileMovementClass || '';
            const className = movementClass ? 'mvmt ' + movementClass : 'mvmt';
            return '<span class="' + className + '">' + escHtml(movement) + '</span>';
        }

        function getRecapRunToneClass(row) {
            if (row.classList.contains('gender-female')) return 'gender-female';
            if (row.classList.contains('gender-male')) return 'gender-male';
            return 'gender-other';
        }

        function trimRecapAbsentEntries(entries) {
            let trimStart = 0;
            while (trimStart < entries.length && !entries[trimStart].on_chart) trimStart++;
            let trimEnd = entries.length - 1;
            while (trimEnd >= trimStart && !entries[trimEnd].on_chart) trimEnd--;
            return trimStart > trimEnd ? [] : entries.slice(trimStart, trimEnd + 1);
        }

        function consolidateRecapAbsentEntries(entries) {
            const trimmed = trimRecapAbsentEntries(entries || []);
            const consolidated = [];
            let index = 0;
            while (index < trimmed.length) {
                if (trimmed[index].on_chart) {
                    consolidated.push(trimmed[index]);
                    index++;
                    continue;
                }
                let count = 0;
                const chartDate = trimmed[index].chart_date;
                while (index < trimmed.length && !trimmed[index].on_chart) {
                    count++;
                    index++;
                }
                consolidated.push({ on_chart: false, count: count, chart_date: chartDate });
            }
            return consolidated;
        }

        function renderRecapRunBoxes(entries, recapBasePath, toneClass) {
            const consolidated = consolidateRecapAbsentEntries(entries);
            return consolidated.map(function(entry) {
                if (entry.on_chart) {
                    let classes = 'recap-run-box ' + toneClass;
                    if (entry.position === 1) classes += ' peak-one';
                    if (currentRecapDate && entry.chart_date === currentRecapDate) classes += ' current';
                    return '<a href="' + recapBasePath + '?date=' + encodeURIComponent(entry.chart_date)
                        + '" class="' + classes + '" title="' + escHtml(entry.chart_date) + '">' + entry.position + '</a>';
                }
                return '<span class="recap-run-box absent" title="' + entry.count + ' days off chart">' + entry.count + 'x</span>';
            }).join('');
        }

        function renderRecapDetail(runEntries, recapBasePath, toneClass) {
            let top1 = 0;
            let top5 = 0;
            let top10 = 0;
            runEntries.forEach(function(entry) {
                if (!entry.on_chart || entry.position == null) return;
                if (entry.position <= 1) top1++;
                if (entry.position <= 5) top5++;
                if (entry.position <= 10) top10++;
            });
            const boxesHtml = renderRecapRunBoxes(runEntries, recapBasePath, toneClass);
            return '<div class="recap-run-stats">'
                + '<div class="recap-run-stat"><div class="recap-run-stat-label">Top 1</div><div class="recap-run-stat-value">' + top1 + '</div></div>'
                + '<div class="recap-run-stat"><div class="recap-run-stat-label">Top 5</div><div class="recap-run-stat-value">' + top5 + '</div></div>'
                + '<div class="recap-run-stat"><div class="recap-run-stat-label">Top 10</div><div class="recap-run-stat-value">' + top10 + '</div></div>'
                + '</div>'
                + '<div class="recap-run-label">Chart-run</div>'
                + '<div class="recap-run-boxes">' + boxesHtml + '</div>';
        }

        function getRecapBasePath(chartType) {
            if (chartType === 'bb') return '/misc/billboard-hot-100/recaps';
            if (chartType === 'trl') return '/misc/trl/recaps';
            return '/misc/vatos-cuntdown/recaps';
        }

        function getRecapRunUrl(chartType, row) {
            let url;
            if (chartType === 'bb') {
                url = '/misc/billboard-hot-100/chart-run?';
            } else if (chartType === 'trl') {
                url = '/misc/trl/chart-run?';
            } else {
                url = '/misc/vatos-cuntdown/chart-run?';
            }

            if (row.dataset.songId) {
                return url + 'songId=' + encodeURIComponent(row.dataset.songId);
            }
            return url + 'artist=' + encodeURIComponent(row.dataset.rawArtist) + '&song=' + encodeURIComponent(row.dataset.rawSong);
        }

        async function getFilteredRecapRunEntries(row, chartType) {
            const runKey = row.dataset.songId
                ? 'song:' + row.dataset.songId
                : 'raw:' + row.dataset.rawArtist + '||' + row.dataset.rawSong;

            let runEntries = recapRunCache.get(runKey);
            if (!runEntries) {
                const response = await fetch(getRecapRunUrl(chartType, row));
                runEntries = await response.json();
                recapRunCache.set(runKey, runEntries);
            }

            return (runEntries || []).filter(function(entry) {
                return !currentRecapDate || !entry.chart_date || entry.chart_date <= currentRecapDate;
            });
        }

        async function loadRecapRunIntoContainer(container, row, chartType) {
            if (!container || container.dataset.loaded || container.dataset.loading) return;

            container.dataset.loading = '1';
            container.innerHTML = '<div class="recap-run-loading">Loading chart run...</div>';
            try {
                const filteredRun = await getFilteredRecapRunEntries(row, chartType);
                container.innerHTML = renderRecapDetail(filteredRun, getRecapBasePath(chartType), getRecapRunToneClass(row));
                container.dataset.loaded = '1';
            } catch (error) {
                container.innerHTML = '<div class="recap-run-error">Failed to load chart run</div>';
            } finally {
                delete container.dataset.loading;
            }
        }

        async function toggleRecapExpand(button, chartType) {
            const row = button.closest('tr');
            let detailRow = row.nextElementSibling;
            if (detailRow && detailRow.classList.contains('mobile-table-detail-row')) {
                detailRow = detailRow.nextElementSibling;
            }
            if (!detailRow || !detailRow.classList.contains('recap-detail-row')) return;
            const isVisible = detailRow.classList.contains('visible');
            detailRow.classList.toggle('visible', !isVisible);
            button.classList.toggle('expanded', !isVisible);
            button.textContent = isVisible ? '+' : '-';
            if (isVisible) return;

            const detailId = row.dataset.detailId;
            const container = document.getElementById(detailId);
            await loadRecapRunIntoContainer(container, row, chartType || 'pc');
        }

        function isPeakNow(entry) {
            return entry && entry.peak != null && Number(entry.position) === Number(entry.peak);
        }
    </script>
</body>
