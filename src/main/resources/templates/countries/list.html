<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries - Music Stats</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <th:block th:replace="~{fragments/navigation :: nav-styles}"></th:block>
    <link rel="stylesheet" th:href="@{/css/catalog-list.css}">
    <script th:src="@{/js/list-utils.js}"></script>
</head>
<body>
    <th:block th:replace="~{fragments/navigation :: navigation}"></th:block>
    <div class="container">
        <div class="toolbar catalog-toolbar">
            <div class="catalog-toolbar-header">
                <div class="catalog-toolbar-heading">
                    <h1 class="catalog-toolbar-title">Countries</h1>
                    <div class="view-toggle" id="catalogViewToggle" role="tablist" aria-label="Country views">
                        <button type="button" class="view-btn active" id="viewBtn-card" onclick="switchCatalogView('card')">Cards</button>
                        <button type="button" class="view-btn" id="viewBtn-table" onclick="switchCatalogView('table')">Table</button>
                    </div>
                </div>
            </div>

            <div class="controls catalog-toolbar-controls">
                <div class="catalog-toolbar-search-row">
                    <div class="search-bar">
                        <form method="get" action="/countries" id="countrySearchForm" class="catalog-toolbar-search-form">
                            <input type="text" autocomplete="off" name="q" th:value="${searchQuery}" placeholder="Search countries..." oninput="this.form.submit()" id="searchInput">
                        </form>
                    </div>
                </div>

                <div class="toolbar-sort-panel">
                    <div class="toolbar-sort-heading">Sort</div>
                    <div class="toolbar-sort-list">
                        <div class="sort-by-section toolbar-sort-row">
                            <label for="sortBySelect" class="toolbar-sort-label">1</label>
                            <select id="sortBySelect" onchange="changeSortBy(this.value)">
                                <option value="albums" th:selected="${sortBy == 'albums'}">Album Count</option>
                                <option value="artists" th:selected="${sortBy == 'artists'}">Artist Count</option>
                                <option value="malealbumpct" th:selected="${sortBy == 'malealbumpct'}">Male Album %</option>
                                <option value="maleartistpct" th:selected="${sortBy == 'maleartistpct'}">Male Artist %</option>
                                <option value="maleplaypct" th:selected="${sortBy == 'maleplaypct'}">Male Play %</option>
                                <option value="malesongpct" th:selected="${sortBy == 'malesongpct'}">Male Song %</option>
                                <option value="maletimepct" th:selected="${sortBy == 'maletimepct'}">Male Time %</option>
                                <option value="winningdays" th:selected="${sortBy == 'winningdays'}">Winning Days</option>
                                <option value="winningweeks" th:selected="${sortBy == 'winningweeks'}">Winning Weeks</option>
                                <option value="winningmonths" th:selected="${sortBy == 'winningmonths'}">Winning Months</option>
                                <option value="winningseasons" th:selected="${sortBy == 'winningseasons'}">Winning Seasons</option>
                                <option value="winningyears" th:selected="${sortBy == 'winningyears'}">Winning Years</option>
                                <option value="winningdecades" th:selected="${sortBy == 'winningdecades'}">Winning Decades</option>
                                <option value="name" th:selected="${sortBy == 'name'}">Name</option>
                                <option value="plays" th:selected="${sortBy == 'plays'}">Play Count</option>
                                <option value="random" th:selected="${sortBy == 'random'}">Random</option>
                                <option value="songs" th:selected="${sortBy == 'songs'}">Song Count</option>
                                <option value="time" th:selected="${sortBy == 'time'}">Time Listened</option>
                            </select>
                            <button type="button" class="sort-dir-btn" id="sortDirBtn" onclick="toggleSortDirection()"
                                    th:title="${sortDir == 'desc' ? 'Descending (click to change)' : 'Ascending (click to change)'}">
                                <span th:if="${sortDir == 'desc'}">↓</span>
                                <span th:if="${sortDir != 'desc'}">↑</span>
                            </button>
                        </div>
                    </div>
                    <div th:replace="~{fragments/saved-filters :: saved-filters}"></div>
                </div>
            </div>
        </div>
        
        <!-- Active Filters Chips -->
        <div class="active-filters" id="activeFilters">
            <div class="filter-chip" th:if="${searchQuery != null and !searchQuery.isEmpty()}">
                <span class="filter-chip-label">Name is</span>
                <span class="filter-chip-value" th:text="${searchQuery}"></span>
                <button class="filter-chip-remove" onclick="removeFilter('q')" type="button">×</button>
            </div>
            
            <button class="clear-all-filters" onclick="clearFilters()" type="button" 
                    th:if="${searchQuery != null and !searchQuery.isEmpty()}">
                Clear
            </button>
        </div>
        
        <!-- Pagination info -->
        <div class="pagination-info">
            <span th:text="${startIndex} + ' - ' + ${endIndex} + ' of ' + ${totalCount}"></span>
        </div>
        
        <div id="cardView">
        <!-- Country cards grid -->
        <div class="catalog-grid">
            <div th:each="country : ${countries}" class="catalog-card" style="cursor: pointer;"
                 th:data-name="${country.name}"
                 onclick="navigateToGraphByName(this, 'country')">
                <div class="catalog-image">
                    <div class="catalog-icon" title="Country">
                        🌐
                    </div>
                </div>
                
                <div class="catalog-info">
                    <h3 class="catalog-name" th:text="${country.name}">Country Name</h3>
                    
                    <!-- Sort metric display (only for non-visible metrics) -->
                    <div class="sort-metric" th:if="${sortBy != defaultSortBy and sortBy != 'random' and sortBy != 'plays' and sortBy != 'time' and sortBy != 'artists' and sortBy != 'albums' and sortBy != 'songs'}">
                        <span class="sort-metric-label" th:switch="${sortBy}">
                            <th:block th:case="'maleartistpct'">Male Artist %:</th:block>
                            <th:block th:case="'malealbumpct'">Male Album %:</th:block>
                            <th:block th:case="'malesongpct'">Male Song %:</th:block>
                            <th:block th:case="'maleplaypct'">Male Play %:</th:block>
                            <th:block th:case="'maletimepct'">Male Time %:</th:block>
                            <th:block th:case="'winningdays'">Winning Days:</th:block>
                            <th:block th:case="'winningweeks'">Winning Weeks:</th:block>
                            <th:block th:case="'winningmonths'">Winning Months:</th:block>
                            <th:block th:case="'winningseasons'">Winning Seasons:</th:block>
                            <th:block th:case="'winningyears'">Winning Years:</th:block>
                            <th:block th:case="'winningdecades'">Winning Decades:</th:block>
                        </span>
                        <span class="sort-metric-value" th:switch="${sortBy}">
                            <th:block th:case="'maleartistpct'" th:text="${country.artistCount > 0 ? #numbers.formatDecimal(country.maleArtistCount * 100.0 / country.artistCount, 1, 1) + '%' : 'N/A'}"></th:block>
                            <th:block th:case="'malealbumpct'" th:text="${country.albumCount > 0 ? #numbers.formatDecimal(country.maleAlbumCount * 100.0 / country.albumCount, 1, 1) + '%' : 'N/A'}"></th:block>
                            <th:block th:case="'malesongpct'" th:text="${country.songCount > 0 ? #numbers.formatDecimal(country.maleSongCount * 100.0 / country.songCount, 1, 1) + '%' : 'N/A'}"></th:block>
                            <th:block th:case="'maleplaypct'" th:text="${country.playCount > 0 ? #numbers.formatDecimal(country.malePlayCount * 100.0 / country.playCount, 1, 1) + '%' : 'N/A'}"></th:block>
                            <th:block th:case="'maletimepct'" th:text="${country.timeListened > 0 ? #numbers.formatDecimal(country.maleTimeListened * 100.0 / country.timeListened, 1, 1) + '%' : 'N/A'}"></th:block>
                            <th:block th:case="'winningdays'" th:text="${country.winningDaysCount}"></th:block>
                            <th:block th:case="'winningweeks'" th:text="${country.winningWeeksCount}"></th:block>
                            <th:block th:case="'winningmonths'" th:text="${country.winningMonthsCount}"></th:block>
                            <th:block th:case="'winningseasons'" th:text="${country.winningSeasonsCount}"></th:block>
                            <th:block th:case="'winningyears'" th:text="${country.winningYearsCount}"></th:block>
                            <th:block th:case="'winningdecades'" th:text="${country.winningDecadesCount}"></th:block>
                        </span>
                    </div>
                    
                    <div class="catalog-stats">
                        <div class="stat" th:classappend="${sortBy == 'artists' ? 'sort-highlight' : ''}">
                            <span class="stat-icon">🎤</span>
                            <span class="stat-value" th:text="${country.artistCount}">0</span>
                        </div>
                        <div class="stat" th:classappend="${sortBy == 'albums' ? 'sort-highlight' : ''}">
                            <span class="stat-icon">💿</span>
                            <span class="stat-value" th:text="${country.albumCount}">0</span>
                        </div>
                        <div class="stat" th:classappend="${sortBy == 'songs' ? 'sort-highlight' : ''}">
                            <span class="stat-icon">🎵</span>
                            <span class="stat-value" th:text="${country.songCount}">0</span>
                        </div>
                    </div>
                    <div class="catalog-stats catalog-stats-plays">
                        <div class="stat" title="Primary plays">
                            <span class="stat-icon primary-plays">⏵</span>
                            <span class="stat-value" th:text="${country.vatitoPlayCount}">0</span>
                        </div>
                        <div class="stat" title="Legacy plays">
                            <span class="stat-icon legacy-plays">⏵</span>
                            <span class="stat-value" th:text="${country.robertloverPlayCount}">0</span>
                        </div>
                        <div class="stat" title="Total plays" th:classappend="${sortBy == 'plays' ? 'sort-highlight' : ''}">
                            <span class="stat-icon total-plays">⏵</span>
                            <span class="stat-value" th:text="${country.playCount}">0</span>
                        </div>
                    </div>
                    <div class="catalog-stats catalog-stats-row2">
                        <div class="stat" th:classappend="${sortBy == 'time' ? 'sort-highlight' : ''}">
                            <span class="stat-icon">🕒</span>
                            <span class="stat-value" th:text="${country.timeListenedFormatted}">0m</span>
                        </div>
                    </div>
                    
                    <!-- Gender breakdown bars -->
                    <div class="gender-bars-container">
                        <div class="gender-bar-row" th:if="${country.maleArtistCount > 0 or country.femaleArtistCount > 0 or country.otherArtistCount > 0}">
                            <span class="gender-bar-icon" title="Artists">🎤</span>
                            <div class="gender-bar" th:with="total=${country.maleArtistCount + country.femaleArtistCount + country.otherArtistCount}, malePct=${total > 0 ? (country.maleArtistCount * 100.0 / total) : 0}">
                                <div class="gender-male-bar"
                                     th:style="'width: ' + ${malePct} + '%'"
                                     th:title="'Male: ' + ${country.maleArtistCount} + ' (' + ${#numbers.formatDecimal(malePct, 1, 2)} + '%)'">
                                    <span class="gender-male-bar-text" th:text="${#numbers.formatDecimal(malePct, 1, 2)} + '%'"></span>
                                </div>
                                <div class="gender-female-bar"
                                     th:style="'width: ' + (${total > 0} ? (${country.femaleArtistCount} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Female: ' + ${country.femaleArtistCount} + ' (' + ${#numbers.formatDecimal((country.femaleArtistCount * 100.0 / total), 1, 2)} + '%)'"></div>
                                <div class="gender-other-bar" 
                                     th:style="'width: ' + (${total > 0} ? (${country.otherArtistCount} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Other: ' + ${country.otherArtistCount} + ' (' + ${#numbers.formatDecimal((country.otherArtistCount * 100.0 / total), 1, 2)} + '%)'"></div>
                            </div>
                        </div>
                        <div class="gender-bar-row" th:if="${country.maleAlbumCount > 0 or country.femaleAlbumCount > 0 or country.otherAlbumCount > 0}">
                            <span class="gender-bar-icon" title="Albums">💿</span>
                            <div class="gender-bar" th:with="total=${country.maleAlbumCount + country.femaleAlbumCount + country.otherAlbumCount}, malePct=${total > 0 ? (country.maleAlbumCount * 100.0 / total) : 0}">
                                <div class="gender-male-bar"
                                     th:style="'width: ' + ${malePct} + '%'"
                                     th:title="'Male: ' + ${country.maleAlbumCount} + ' (' + ${#numbers.formatDecimal(malePct, 1, 2)} + '%)'">
                                    <span class="gender-male-bar-text" th:text="${#numbers.formatDecimal(malePct, 1, 2)} + '%'"></span>
                                </div>
                                <div class="gender-female-bar"
                                     th:style="'width: ' + (${total > 0} ? (${country.femaleAlbumCount} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Female: ' + ${country.femaleAlbumCount} + ' (' + ${#numbers.formatDecimal((country.femaleAlbumCount * 100.0 / total), 1, 2)} + '%)'"></div>
                                <div class="gender-other-bar" 
                                     th:style="'width: ' + (${total > 0} ? (${country.otherAlbumCount} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Other: ' + ${country.otherAlbumCount} + ' (' + ${#numbers.formatDecimal((country.otherAlbumCount * 100.0 / total), 1, 2)} + '%)'"></div>
                            </div>
                        </div>
                        <div class="gender-bar-row" th:if="${country.maleCount > 0 or country.femaleCount > 0 or country.otherCount > 0}">
                            <span class="gender-bar-icon" title="Songs">🎵</span>
                            <div class="gender-bar" th:with="total=${country.maleCount + country.femaleCount + country.otherCount}, malePct=${total > 0 ? (country.maleCount * 100.0 / total) : 0}">
                                <div class="gender-male-bar"
                                     th:style="'width: ' + ${malePct} + '%'"
                                     th:title="'Male: ' + ${country.maleCount} + ' (' + ${#numbers.formatDecimal(malePct, 1, 2)} + '%)'">
                                    <span class="gender-male-bar-text" th:text="${#numbers.formatDecimal(malePct, 1, 2)} + '%'"></span>
                                </div>
                                <div class="gender-female-bar"
                                     th:style="'width: ' + (${total > 0} ? (${country.femaleCount} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Female: ' + ${country.femaleCount} + ' (' + ${#numbers.formatDecimal((country.femaleCount * 100.0 / total), 1, 2)} + '%)'"></div>
                                <div class="gender-other-bar" 
                                     th:style="'width: ' + (${total > 0} ? (${country.otherCount} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Other: ' + ${country.otherCount} + ' (' + ${#numbers.formatDecimal((country.otherCount * 100.0 / total), 1, 2)} + '%)'"></div>
                            </div>
                        </div>
                        <div class="gender-bar-row" th:if="${country.malePlayCount > 0 or country.femalePlayCount > 0 or country.otherPlayCount > 0}">
                            <span class="gender-bar-icon total-plays" title="Plays">⏵</span>
                            <div class="gender-bar" th:with="total=${country.malePlayCount + country.femalePlayCount + country.otherPlayCount}, malePct=${total > 0 ? (country.malePlayCount * 100.0 / total) : 0}">
                                <div class="gender-male-bar"
                                     th:style="'width: ' + ${malePct} + '%'"
                                     th:title="'Male: ' + ${country.malePlayCount} + ' (' + ${#numbers.formatDecimal(malePct, 1, 2)} + '%)'">
                                    <span class="gender-male-bar-text" th:text="${#numbers.formatDecimal(malePct, 1, 2)} + '%'"></span>
                                </div>
                                <div class="gender-female-bar"
                                     th:style="'width: ' + (${total > 0} ? (${country.femalePlayCount} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Female: ' + ${country.femalePlayCount} + ' (' + ${#numbers.formatDecimal((country.femalePlayCount * 100.0 / total), 1, 2)} + '%)'"></div>
                                <div class="gender-other-bar" 
                                     th:style="'width: ' + (${total > 0} ? (${country.otherPlayCount} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Other: ' + ${country.otherPlayCount} + ' (' + ${#numbers.formatDecimal((country.otherPlayCount * 100.0 / total), 1, 2)} + '%)'"></div>
                            </div>
                        </div>
                        <div class="gender-bar-row" th:if="${country.maleTimeListened > 0 or country.femaleTimeListened > 0 or country.otherTimeListened > 0}">
                            <span class="gender-bar-icon" title="Listening Time">🕒</span>
                            <div class="gender-bar" th:with="total=${country.maleTimeListened + country.femaleTimeListened + country.otherTimeListened}, malePct=${total > 0 ? (country.maleTimeListened * 100.0 / total) : 0}">
                                <div class="gender-male-bar"
                                     th:style="'width: ' + ${malePct} + '%'"
                                     th:title="'Male: ' + ${#numbers.formatDecimal(malePct, 1, 2)} + '%'">
                                    <span class="gender-male-bar-text" th:text="${#numbers.formatDecimal(malePct, 1, 2)} + '%'"></span>
                                </div>
                                <div class="gender-female-bar"
                                     th:style="'width: ' + (${total > 0} ? (${country.femaleTimeListened} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Female: ' + ${#numbers.formatDecimal((country.femaleTimeListened * 100.0 / total), 1, 2)} + '%'"></div>
                                <div class="gender-other-bar" 
                                     th:style="'width: ' + (${total > 0} ? (${country.otherTimeListened} * 100 / ${total}) : 0) + '%'"
                                     th:title="'Other: ' + ${#numbers.formatDecimal((country.otherTimeListened * 100.0 / total), 1, 2)} + '%'"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Top artist/album/song for this country -->
                    <div th:if="${country.topArtistName != null or country.topAlbumName != null or country.topSongName != null}"
                         class="number-one-info">
                        <a th:if="${country.topArtistName != null}"
                           th:class="${'number-one-item' + (country.topArtistGenderId == 2 ? ' gender-male' : (country.topArtistGenderId == 1 ? ' gender-female' : ''))}"
                           th:href="@{'/artists/' + ${country.topArtistId}}" onclick="event.stopPropagation();">
                            <span class="label">🎤</span>
                            <span class="name" th:text="${country.topArtistName}" th:title="${country.topArtistName}">Artist Name</span>
                        </a>
                        <a th:if="${country.topAlbumName != null}"
                           th:class="${'number-one-item' + (country.topAlbumGenderId == 2 ? ' gender-male' : (country.topAlbumGenderId == 1 ? ' gender-female' : ''))}"
                           th:href="@{'/albums/' + ${country.topAlbumId}}" onclick="event.stopPropagation();">
                            <span class="label">💿</span>
                            <span class="name" th:text="${country.topAlbumArtistName + ' - ' + country.topAlbumName}" th:title="${country.topAlbumArtistName + ' - ' + country.topAlbumName}">Artist - Album</span>
                        </a>
                        <a th:if="${country.topSongName != null}"
                           th:class="${'number-one-item' + (country.topSongGenderId == 2 ? ' gender-male' : (country.topSongGenderId == 1 ? ' gender-female' : ''))}"
                           th:href="@{'/songs/' + ${country.topSongId}}" onclick="event.stopPropagation();">
                            <span class="label">🎵</span>
                            <span class="name" th:text="${country.topSongArtistName + ' - ' + country.topSongName}" th:title="${country.topSongArtistName + ' - ' + country.topSongName}">Artist - Song</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        </div>

        <div id="tableView" style="display:none;">
            <th:block th:replace="~{fragments/catalog-list-table :: metric-table(${countries}, 'countries', false, true, true, 'country', 'name', 'name', 'Country')}"></th:block>
        </div>
        
        <!-- Pagination controls (bottom) -->
    </div>
    
    <script>
        function changeSortBy(sortValue) {
            const url = new URL(window.location);
            url.searchParams.set('sortby', sortValue);
            syncRandomSeedParam(url, { refresh: sortValue === 'random' });
            url.searchParams.set('page', '0');
            window.location.href = url.toString();
        }
        
        function toggleSortDirection() {
            const url = new URL(window.location);
            const currentDir = url.searchParams.get('sortdir') || 'asc';
            url.searchParams.set('sortdir', currentDir === 'asc' ? 'desc' : 'asc');
            syncRandomSeedParam(url);
            url.searchParams.set('page', '0');
            window.location.href = url.toString();
        }
        
        function clearFilters() {
            const sortBy = document.getElementById('sortBySelect').value;
            const url = new URL('/countries', window.location.origin);
            url.searchParams.set('sortby', sortBy);
            syncRandomSeedParam(url);
            window.location.href = url.toString();
        }
        
        function removeFilter(paramName) {
            const url = new URL(window.location);
            url.searchParams.delete(paramName);
            window.location.href = url.toString();
        }
        
        function navigateToGraphByName(element, filterType) {
            const name = encodeURIComponent(element.getAttribute('data-name'));
            window.location.href = '/songs?' + filterType + '=' + name + '&' + filterType + 'Mode=includes';
        }

        // Auto-focus search input if there's a search query
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput && searchInput.value) {
                searchInput.focus();
                searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
            }
        });
    </script>
</body>
</html>
