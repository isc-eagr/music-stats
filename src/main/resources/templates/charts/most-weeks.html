<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Most Weeks at Position - Music Stats</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <th:block th:replace="~{fragments/navigation :: nav-styles}"></th:block>
    <style>
        .most-weeks-page {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .most-weeks-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .most-weeks-title {
            font-size: 1.8rem;
            color: #fff;
            margin: 0 0 20px 0;
        }
        
        /* Type toggle (Albums/Songs) */
        .type-toggle {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 20px;
        }
        
        .type-toggle-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .type-toggle-btn:first-child {
            border-radius: 8px 0 0 8px;
            border-right: none;
        }
        
        .type-toggle-btn:last-child {
            border-radius: 0 8px 8px 0;
        }
        
        .type-toggle-btn.active {
            background: #2d5016;
            border-color: #3d6b1e;
            color: #fff;
        }
        
        .type-toggle-btn:hover:not(.active) {
            background: #2a2a2a;
            border-color: #444;
            color: #fff;
        }
        
        /* Position tabs */
        .position-tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .position-tab {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-decoration: none;
            text-transform: uppercase;
        }
        
        .position-tab:first-child {
            border-radius: 8px 0 0 8px;
        }
        
        .position-tab:last-child {
            border-radius: 0 8px 8px 0;
        }
        
        .position-tab:not(:first-child) {
            border-left: none;
        }
        
        .position-tab.active {
            background: #2d5016;
            border-color: #3d6b1e;
            color: #fff;
        }
        
        .position-tab:hover:not(.active) {
            background: #2a2a2a;
            border-color: #444;
            color: #fff;
        }
        
        /* Year filter section */
        .year-filter-section {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .year-filter-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
        }
        
        .year-picker {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 35px 10px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }
        
        .year-picker:hover {
            border-color: #444;
            background-color: #2a2a2a;
        }
        
        .year-picker:focus {
            outline: none;
            border-color: #22c55e;
        }
        
        .year-picker option {
            background: #1a1a1a;
            color: #fff;
        }
        
        /* Results table */
        .results-table-container {
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .results-table th,
        .results-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .results-table th {
            background: #111;
            color: #888;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .results-table th .sort-icon {
            margin-left: 4px;
            opacity: 0.5;
        }

        .results-table th a.sort-link {
            color: inherit;
            text-decoration: none;
            white-space: nowrap;
        }

        .results-table th a.sort-link:hover {
            color: #fff;
        }
        
        .results-table tbody tr:hover {
            background: #151515;
        }
        
        .results-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* Column styling */
        .col-rank {
            width: 60px;
            text-align: center;
            font-weight: 600;
            color: #fff;
            font-size: 1.1rem;
        }
        
        .col-title {
            min-width: 200px;
        }
        
        .col-artist {
            min-width: 150px;
        }
        
        .col-peak {
            width: 80px;
            text-align: center;
            font-weight: 600;
            color: #fbbf24;
            font-size: 1rem;
        }

        .col-weeks {
            width: 100px;
            text-align: right;
            font-weight: 600;
            color: #22c55e;
            font-size: 1.1rem;
        }
        
        /* Title cell with image */
        .title-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .title-image {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
        }
        
        .title-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #444;
        }
        
        .title-text {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        .title-text:hover {
            color: #22c55e;
            text-decoration: underline;
        }
        
        .artist-link {
            color: #aaa;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        .artist-link:hover {
            color: #fff;
            text-decoration: underline;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state-text {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/navigation :: navigation}"></nav>
    
    <div class="most-weeks-page">
        <div class="most-weeks-header">
            <h1 class="most-weeks-title">Most Weeks at Position</h1>
            
            <!-- Type toggle (Albums/Songs) -->
            <div class="type-toggle">
                <a th:href="@{/charts/most-weeks(type='album', position=${selectedType == 'album' ? selectedPosition : (selectedPosition > 10 ? 1 : selectedPosition)}, year=${selectedYear}, sort=${selectedSort}, dir=${selectedDir})}"
                   class="type-toggle-btn"
                   th:classappend="${selectedType == 'album'} ? 'active' : ''"
                   title="Albums">&#128191;</a>
                <a th:href="@{/charts/most-weeks(type='song', position=${selectedPosition}, year=${selectedYear}, sort=${selectedSort}, dir=${selectedDir})}"
                   class="type-toggle-btn"
                   th:classappend="${selectedType == 'song'} ? 'active' : ''"
                   title="Songs">🎵</a>
            </div>
            
            <!-- Position tabs -->
            <div class="position-tabs">
                <a th:href="@{/charts/most-weeks(type=${selectedType}, position=1, year=${selectedYear}, sort=${selectedSort}, dir=${selectedDir})}"
                   class="position-tab"
                   th:classappend="${selectedPosition == 1} ? 'active' : ''">#1</a>
                <a th:href="@{/charts/most-weeks(type=${selectedType}, position=5, year=${selectedYear}, sort=${selectedSort}, dir=${selectedDir})}"
                   class="position-tab"
                   th:classappend="${selectedPosition == 5} ? 'active' : ''">Top 5</a>
                <a th:href="@{/charts/most-weeks(type=${selectedType}, position=10, year=${selectedYear}, sort=${selectedSort}, dir=${selectedDir})}"
                   class="position-tab"
                   th:classappend="${selectedPosition == 10} ? 'active' : ''">Top 10</a>
                <a th:if="${selectedType == 'song'}"
                   th:href="@{/charts/most-weeks(type=${selectedType}, position=20, year=${selectedYear}, sort=${selectedSort}, dir=${selectedDir})}"
                   class="position-tab"
                   th:classappend="${selectedPosition == 20} ? 'active' : ''">Top 20</a>
            </div>
            
            <!-- Year filter -->
            <div class="year-filter-section">
                <div class="year-filter-label">Filter by year</div>
                <select class="year-picker" onchange="navigateToYear(this.value)">
                    <option value="" th:selected="${selectedYear == null}">All</option>
                    <option th:each="yearObj : ${years}" 
                            th:value="${yearObj.year}" 
                            th:text="${yearObj.displayName}"
                            th:selected="${yearObj.year == (selectedYear != null ? selectedYear.toString() : '')}">
                    </option>
                </select>
            </div>
        </div>
        
        <!-- Results table -->
        <div class="results-table-container"
             th:if="${not #lists.isEmpty(entries)}"
             id="results-container"
             th:data-total="${totalCount}"
             th:data-page-size="${pageSize}"
             th:data-type="${selectedType}"
             th:data-position="${selectedPosition}"
             th:data-year="${selectedYear != null ? selectedYear : ''}"
             th:data-sort="${selectedSort}"
             th:data-dir="${selectedDir}">
            <table class="results-table">
                <thead>
                    <tr>
                        <th class="col-rank">#</th>
                        <th class="col-title">
                            <a th:href="@{/charts/most-weeks(type=${selectedType},position=${selectedPosition},year=${selectedYear},sort='name',dir=${selectedSort == 'name' ? (selectedDir == 'asc' ? 'desc' : 'asc') : 'asc'})}" class="sort-link">
                                Title <span class="sort-icon" th:text="${selectedSort == 'name' ? (selectedDir == 'asc' ? '▲' : '▼') : '↕'}"></span>
                            </a>
                        </th>
                        <th class="col-artist">
                            <a th:href="@{/charts/most-weeks(type=${selectedType},position=${selectedPosition},year=${selectedYear},sort='artist',dir=${selectedSort == 'artist' ? (selectedDir == 'asc' ? 'desc' : 'asc') : 'asc'})}" class="sort-link">
                                Artist <span class="sort-icon" th:text="${selectedSort == 'artist' ? (selectedDir == 'asc' ? '▲' : '▼') : '↕'}"></span>
                            </a>
                        </th>
                        <th th:if="${selectedPosition > 1}" class="col-peak">
                            <a th:href="@{/charts/most-weeks(type=${selectedType},position=${selectedPosition},year=${selectedYear},sort='peak',dir=${selectedSort == 'peak' ? (selectedDir == 'asc' ? 'desc' : 'asc') : 'asc'})}" class="sort-link">
                                Peak <span class="sort-icon" th:text="${selectedSort == 'peak' ? (selectedDir == 'asc' ? '▲' : '▼') : '↕'}"></span>
                            </a>
                        </th>
                        <th class="col-weeks">
                            <a th:href="@{/charts/most-weeks(type=${selectedType},position=${selectedPosition},year=${selectedYear},sort='weeks',dir=${selectedSort == 'weeks' ? (selectedDir == 'desc' ? 'asc' : 'desc') : 'desc'})}" class="sort-link">
                                Total <span class="sort-icon" th:text="${selectedSort == 'weeks' ? (selectedDir == 'desc' ? '▼' : '▲') : '↕'}"></span>
                            </a>
                        </th>
                    </tr>
                </thead>
                <tbody id="results-tbody">
                    <tr th:each="entry : ${entries}"
                        th:style="${entry.genderId == 1} ? 'background: rgba(236, 72, 153, 0.15); border-left: 3px solid rgba(236, 72, 153, 0.6);' : (${entry.genderId == 2} ? 'background: rgba(59, 130, 246, 0.15); border-left: 3px solid rgba(59, 130, 246, 0.6);' : '')">
                        <td class="col-rank" th:text="${entry.rank}">1</td>
                        <td class="col-title">
                            <div class="title-cell">
                                <!-- Song with hover pattern: show album by default, song on hover -->
                                <th:block th:if="${entry.type == 'song'}">
                                    <!-- Case 1: Song has image AND album has image - show album by default, song on hover -->
                                    <div th:if="${entry.hasImage and entry.albumHasImage}" class="hover-image-container" style="width:40px;height:40px;">
                                        <img th:src="@{'/albums/' + ${entry.albumId} + '/image'}"
                                             alt="" class="album-image-default title-image">
                                        <img th:src="@{'/songs/' + ${entry.id} + '/image'}"
                                             alt="" class="song-image-hover title-image">
                                    </div>
                                    <!-- Case 2: Song has image but album doesn't - just show song image -->
                                    <img th:if="${entry.hasImage and !entry.albumHasImage}"
                                         th:src="@{'/songs/' + ${entry.id} + '/image'}"
                                         alt="" class="title-image">
                                    <!-- Case 3: Song doesn't have image but album does - show album image -->
                                    <img th:if="${!entry.hasImage and entry.albumId != null}"
                                         th:src="@{'/albums/' + ${entry.albumId} + '/image'}"
                                         alt="" class="title-image inherited-cover"
                                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                    <!-- Case 4: No image available -->
                                    <div th:if="${!entry.hasImage and entry.albumId == null}" class="title-placeholder">
                                        <span>🎵</span>
                                    </div>
                                    <div th:if="${!entry.hasImage and entry.albumId != null}" class="title-placeholder" style="display: none;">
                                        <span>🎵</span>
                                    </div>
                                </th:block>
                                <!-- Album - just show album image -->
                                <th:block th:if="${entry.type == 'album'}">
                                    <img th:if="${entry.hasImage}"
                                         th:src="@{'/albums/' + ${entry.id} + '/image'}"
                                         alt="" class="title-image">
                                    <div th:unless="${entry.hasImage}" class="title-placeholder">
                                        <span>💿</span>
                                    </div>
                                </th:block>
                                <!-- Title link -->
                                <a th:if="${entry.type == 'song'}" 
                                   th:href="@{'/songs/' + ${entry.id}}" 
                                   th:text="${entry.name}"
                                   class="title-text">Song Title</a>
                                <a th:if="${entry.type == 'album'}" 
                                   th:href="@{'/albums/' + ${entry.id}}" 
                                   th:text="${entry.name}"
                                   class="title-text">Album Title</a>
                            </div>
                        </td>
                        <td class="col-artist">
                            <a th:href="@{'/artists/' + ${entry.artistId}}" 
                               th:text="${entry.artistName}"
                               class="artist-link">Artist Name</a>
                        </td>
                        <td th:if="${selectedPosition > 1}" class="col-peak" th:text="'#' + ${entry.peakPosition}">1</td>
                        <td class="col-weeks" th:text="${entry.weeksCount}">10</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="infinite-scroll-sentinel" style="height:1px;"></div>
        <div id="loading-more" style="display:none; text-align:center; padding:16px; color:#888; font-size:0.9rem;">Loading...</div>
        
        <!-- Empty state -->
        <div class="empty-state" th:if="${#lists.isEmpty(entries)}">
            <div class="empty-state-icon">📊</div>
            <div class="empty-state-text">No chart data available for the selected filters.</div>
        </div>
    </div>
    
    <script th:inline="javascript">
        function navigateToYear(year) {
            const type     = /*[[${selectedType}]]*/ 'song';
            const position = /*[[${selectedPosition}]]*/ 1;
            const sort     = /*[[${selectedSort}]]*/ 'weeks';
            const dir      = /*[[${selectedDir}]]*/ 'desc';
            let url = '/charts/most-weeks?type=' + encodeURIComponent(type) + '&position=' + position + '&sort=' + sort + '&dir=' + dir;
            if (year && year !== '') {
                url += '&year=' + encodeURIComponent(year);
            }
            window.location.href = url;
        }

        // Infinite scroll
        (function() {
            const container = document.getElementById('results-container');
            if (!container) return;

            const totalCount  = parseInt(container.dataset.total);
            const pageSize    = parseInt(container.dataset.pageSize);
            const type        = container.dataset.type;
            const position    = container.dataset.position;
            const year        = container.dataset.year;
            const sort        = container.dataset.sort;
            const dir         = container.dataset.dir;
            const showPeak    = parseInt(position) > 1;
            const initialRows = /*[[${#lists.size(entries)}]]*/ 0;

            let currentPage = 1;
            let loadedCount = initialRows;
            let isLoading   = false;

            if (loadedCount >= totalCount) return;

            const tbody     = document.getElementById('results-tbody');
            const loadingEl = document.getElementById('loading-more');
            const sentinel  = document.getElementById('infinite-scroll-sentinel');

            function escHtml(s) {
                return String(s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function buildImageHtml(entry) {
                if (entry.type === 'song') {
                    if (entry.hasImage && entry.albumHasImage) {
                        return `<div class="hover-image-container" style="width:40px;height:40px;">`
                             + `<img src="/albums/${entry.albumId}/image" alt="" class="album-image-default title-image">`
                             + `<img src="/songs/${entry.id}/image" alt="" class="song-image-hover title-image">`
                             + `</div>`;
                    } else if (entry.hasImage) {
                        return `<img src="/songs/${entry.id}/image" alt="" class="title-image">`;
                    } else if (entry.albumId !== null) {
                        return `<img src="/albums/${entry.albumId}/image" alt="" class="title-image inherited-cover"`
                             + ` onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
                             + `<div class="title-placeholder" style="display:none;"><span>&#127925;</span></div>`;
                    } else {
                        return `<div class="title-placeholder"><span>&#127925;</span></div>`;
                    }
                } else {
                    return entry.hasImage
                        ? `<img src="/albums/${entry.id}/image" alt="" class="title-image">`
                        : `<div class="title-placeholder"><span>&#128191;</span></div>`;
                }
            }

            function buildRow(entry) {
                const gStyle = entry.genderId === 1
                    ? 'background:rgba(236,72,153,0.15);border-left:3px solid rgba(236,72,153,0.6);'
                    : entry.genderId === 2
                    ? 'background:rgba(59,130,246,0.15);border-left:3px solid rgba(59,130,246,0.6);'
                    : '';
                const path    = entry.type === 'song' ? 'songs' : 'albums';
                const imgHtml = buildImageHtml(entry);
                const peakCell = showPeak ? `<td class="col-peak">#${entry.peakPosition}</td>` : '';
                return `<tr style="${gStyle}">`
                     + `<td class="col-rank">${entry.rank}</td>`
                     + `<td class="col-title"><div class="title-cell">${imgHtml}`
                     + `<a href="/${path}/${entry.id}" class="title-text">${escHtml(entry.name)}</a>`
                     + `</div></td>`
                     + `<td class="col-artist"><a href="/artists/${entry.artistId}" class="artist-link">${escHtml(entry.artistName)}</a></td>`
                     + peakCell
                     + `<td class="col-weeks">${entry.weeksCount}</td>`
                     + `</tr>`;
            }

            async function loadMore() {
                if (isLoading || loadedCount >= totalCount) return;
                isLoading = true;
                loadingEl.style.display = 'block';
                try {
                    let url = `/charts/most-weeks/data?type=${encodeURIComponent(type)}&position=${position}&page=${currentPage}&size=${pageSize}&sort=${encodeURIComponent(sort)}&dir=${encodeURIComponent(dir)}`;
                    if (year) url += `&year=${encodeURIComponent(year)}`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    const html = data.entries.map(buildRow).join('');
                    tbody.insertAdjacentHTML('beforeend', html);
                    loadedCount += data.entries.length;
                    currentPage++;
                } catch (e) {
                    console.error('Error loading more entries:', e);
                } finally {
                    isLoading = false;
                    loadingEl.style.display = 'none';
                }
            }

            new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) loadMore();
            }, { rootMargin: '300px' }).observe(sentinel);
        })();
    </script>
</body>
</html>
